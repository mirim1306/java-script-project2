<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호냥이 디펜스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-800 text-gray-100 flex justify-center items-center min-h-screen">

    <!-- 시작 화면 -->
    <div id="start-screen" class="screen">
        <img src="images/logo.png" class="mb-10" style="max-width: 80%; height: auto; width: 500px; margin-top: -20vh;">
        <div class="btn-group flex flex-col items-center">
            <!-- 시작 버튼: 종족 선택 화면으로 이동 -->
            <button id="startButton" class="btn start-btn">게임 시작</button>
            <button id="optionButton" class="btn">옵션</button>
            <button id="exitButton" class="btn exit-btn">게임 종료</button>
        </div>
        <!-- 인증 코드 추가 -->
        <div style="position: fixed; bottom: 20px; right: 20px; background-color: rgba(0, 0, 0, 0.6); padding: 12px 20px; border-radius: 8px; border: 2px solid #D4AF37;">
            <p style="margin: 0; font-size: 0.9rem; color: #D4AF37; font-weight: bold;">인증 코드</p>
            <p id="authCodeDisplay" style="margin: 5px 0 0 0; font-size: 1.1rem; color: white; font-family: 'Courier New', monospace; letter-spacing: 2px;">생성 중...</p>
        </div>
    </div>

    <!-- 계정 찾기 화면 -->
    <div id="account-find-screen" class="screen hidden">
        <h2 class="text-3xl font-bold mb-8 text-yellow-300">계정 찾기</h2>

        <div class="bg-gray-700 p-8 rounded-lg shadow-lg max-w-md w-full">
            <p class="text-lg mb-4 text-gray-300">인증 코드를 입력하여 계정을 찾으세요</p>  

            <input 
                type="text" 
                id="authCodeInput" 
                placeholder="HN-XXXX-XXXX-XXXX" 
                class="w-full p-3 rounded bg-gray-800 text-white text-center text-lg font-mono tracking-wider mb-4 border-2 border-gray-600 focus:border-yellow-400 outline-none"
                maxlength="17"
            />

            <div class="flex gap-3">
                <button id="findAccountButton" class="id-btn flex-1">계정 찾기</button>
                <button id="resetAccountButton" class="id-btn exit-btn flex-1">초기화</button>
            </div>

            <p id="findResultMessage" class="text-center mt-4 text-sm hidden"></p>
        </div>

        <!-- 뒤로가기 버튼: 시작 화면으로 -->
        <button id="backToStartButton" class="back-btn">뒤로가기</button>
    </div>

    <!-- 종족 선택 화면 -->
    <div id="race-selection-screen" class="screen hidden">
        <h2 class="text-3xl font-bold mb-8 text-yellow-300">종족 선택</h2>
        <div id="race-group" class="race-group">
            <!-- 토깽이편 선택: 장 선택 화면으로 이동 -->
            <button id="tokkaengiRace" class="btn unlocked">토깽이편</button>
            <button id="otherRace1" class="btn locked" disabled>다른 종족 1</button>
            <button id="otherRace2" class="btn locked" disabled>다른 종족 2</button>
        </div>
        <!-- 뒤로가기 버튼: 시작 화면으로 -->
        <button id="backButton" class="back-btn">뒤로가기</button>
    </div>

    <!-- 장 선택 화면 -->
    <div id="chapter-selection-screen" class="screen hidden">
        <h2 class="text-3xl font-bold mb-8 text-yellow-300">장 선택</h2>
        <div id="chapter-buttons">
            <!-- 챕터 1 선택: 홈 화면으로 이동 -->
            <button id="chapter1" class="btn unlocked">제 1장</button>
            <button id="chapter2" class="btn locked" disabled>제 2장: 잠금</button>
            <button id="chapter3" class="btn locked" disabled>제 3장: 잠금</button>
        </div>
        <!-- 뒤로가기 버튼: 종족 선택 화면으로 -->
        <button id="backToRaceButton" class="back-btn">뒤로가기</button>
    </div>

    <!-- 홈 화면 (기지) -->
    <div id="home-screen" class="screen hidden">
        <h1 class="text-4xl font-bold mb-8 text-yellow-300">기지</h1>
        <div class="btn-group flex flex-col items-start gap-5">
            <!-- 전투 개시 버튼: 전투 맵 화면으로 이동 -->
            <button id="battleStartButton" class="btn start-btn">전투 개시</button>
            <button id="powerUpButton" class="btn">파워 업</button> 
            <button id="characterButton" class="btn">캐릭터 편성</button>
        </div>
        <!-- 뒤로가기 버튼: 장 선택 화면으로 -->
        <button id="backToChapterButton" class="back-btn">뒤로가기</button>
    </div>

    <!-- 전투 맵 화면 (전투 개시 전) -->
    <div id="battle-map-screen" class="screen hidden">
        <!-- 맵 마커들 -->
        <!-- 1-1: 한국 -->
        <div class="map-marker absolute text-lg font-bold p-3 rounded-full bg-blue-500 hover:bg-blue-600 cursor-pointer shadow-lg" style="top: 61%; left: 41%;" data-level="1-1">1-1</div>

        <!-- 1-2: 일본 -->
        <div class="map-marker absolute text-lg font-bold p-3 rounded-full bg-blue-500 hover:bg-blue-600 cursor-pointer shadow-lg" style="top: 61%; left: 55%;" data-level="1-2">1-2</div>

        <!-- 1-3: 중국 -->
        <div class="map-marker absolute text-lg font-bold p-3 rounded-full bg-blue-500 hover:bg-blue-600 cursor-pointer shadow-lg" style="top: 70%; left: 20%;" data-level="1-3">1-3</div>

        <!-- 1-4: 러시아 -->
        <div class="map-marker absolute text-lg font-bold p-3 rounded-full bg-blue-500 hover:bg-blue-600 cursor-pointer shadow-lg" style="top: 15%; left: 45%;" data-level="1-4">1-4</div>

        <!-- 뒤로가기 버튼: 홈 화면으로 -->
        <button id="backToHomeFromMapButton" class="back-btn">뒤로가기</button>
    </div>

    <!-- 파워 업 화면 -->
    <div id="power-up-screen" class="screen hidden power-up-screen-style">
        <h2 class="text-3xl font-bold mb-4 text-yellow-300">파워 업</h2>
        <p class="text-xl mb-6">보유 코인: <span id="current-coins" class="text-yellow-400 font-bold">0</span></p>
        <div id="power-up-list" class="flex flex-col gap-4 w-full max-w-lg">
        </div>

        <!-- 1. 기지/코인 업그레이드 -->
        <div class="power-up-section w-full max-w-lg mb-8">
            <h3 class="text-2xl font-semibold mb-3 text-white border-b border-gray-600 pb-2">기지/코인 업그레이드</h3>
            <div id="general-power-up-list" class="flex flex-col items-center w-full">
            </div>
        </div>

        <!-- 2. 캐릭터 레벨 업 -->
        <div class="power-up-section w-full max-w-lg mb-8">
            <h3 class="text-2xl font-semibold mb-3 text-white border-b border-gray-600 pb-2">캐릭터 레벨 업</h3>
            <div id="character-power-up-list" class="flex flex-col items-center w-full">
            </div>
        </div>

        <!-- 뒤로가기 버튼: 홈 화면으로 -->
        <button id="backToHomeFromPowerUpButton" class="back-btn">뒤로가기</button>
    </div>

    <!-- 캐릭터 편성 화면 -->
    <div id="character-selection-screen" class="screen hidden character-selection-screen-style">
        <h2 class="text-3xl font-bold mb-8 text-yellow-300 w-full text-center">캐릭터 편성</h2>

        <div class="selection-area">
            <!-- 캐릭터 풀 -->
            <div class="character-pool flex flex-col items-center">
                <h3 class="text-xl font-semibold mb-3 text-yellow-300 w-full text-left">보유 캐릭터 (가로 스크롤)</h3>
                <div id="character-pool-container" class="character-pool-container-style w-full flex justify-start">
                </div>
                <p class="text-sm mt-2 text-gray-400 w-full text-left">선택하여 편성에 추가하세요.</p>
            </div>

            <!-- 편성 슬롯 (10개) -->
            <div class="formation-pool flex flex-col items-center mt-8">
                <h3 class="text-xl font-semibold mb-3 text-yellow-300 w-full text-left">전투 편성 (10자리)</h3>
                <div id="formation-grid">
                </div>
                <p class="text-sm mt-2 text-gray-400 w-full text-left">클릭하여 캐릭터를 편성에서 제외합니다.</p>
            </div>
        </div>

        <!-- 뒤로가기 버튼: 홈 화면으로 -->
        <button id="backToHomeFromCharacterButton" class="back-btn">뒤로가기</button>
    </div>


    <!-- 게임 화면 (캔버스 포함) -->
    <div id="game-screen" class="screen hidden">
        <div id="info-bar" class="hidden">
            <span id="coin-in-game" class="text-xl font-bold text-yellow-400">코인: 0</span>
        </div>
    
        <canvas id="gameCanvas" class="game-canvas"></canvas>
    
        <div id="summon-controls">
            </div>
        
        <div id="game-controls">
            <button id="pauseButton" class="btn start-btn">일시정지</button>
            <button id="exitGameButton" class="btn exit-btn">전투 포기</button>
        </div>
    </div>

    <!-- 승패 메시지 박스 -->
    <div id="messageBox" class="message-box hidden">
        <p id="messageText" class="text-lg font-bold mb-3"></p>
        <button id="messageCloseButton" class="btn start-btn mx-auto">확인</button>
    </div>

    <!-- 게임 로직 로드 -->
    <script src="game.js"></script>
</body>
</html>
